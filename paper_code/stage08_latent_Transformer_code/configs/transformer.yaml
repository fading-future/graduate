seed: 42

data:
  raw_data_dir: /chendou_space/data/binary_Training_Data
  porosity_csv: /chendou_space/data/aligned_Training_Data/processing_report.csv
  file_glob: "*.npy"
  patch_size: 64
  transformer_patch_size: 128
  transformer_patch_stride: 64
  porosity_source: compute  # or csv
  train_split: 0.9
  num_workers: 4
  pore_value: 1
  max_train_samples: null

vqvae:
  in_channels: 1
  out_channels: 1
  encoder_channels: [16, 64, 128, 256, 512]
  decoder_channels: [512, 256, 256, 64, 16, 16]
  latent_dim: 256
  num_res_blocks_enc: 2
  num_res_blocks_dec: 3
  groups: 16
  codebook_size: 3000
  beta: 1

model:
  vocab_size: 3001
  block_size: 512
  n_layer: 12
  n_head: 12
  n_embd: 1080
  dropout: 0.01
  bias: true
  cond_dim: 1
  cond_embd: 100
  tokens_per_patch: 64
  sos_token: 3000

train:
  epochs: 50
  batch_size: 32
  lr: 0.0002
  beta1: 0.9
  beta2: 0.999
