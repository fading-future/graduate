# config/train_config.yaml

experiment:
  exp_name: "exp01_cube_structure_v1"  # 修改这里开启新实验
  exp_description: "正式组训 256^3 结构数据，切成了128^3块进行训练，KL-VAE + 对抗训练"
  save_dir: "./experiments"

data:
  data_root: "/chendou_space/data/aligned_Training_Data" # 你的数据文件夹路径
  file_extension: ".npy"               # 假设你的数据存为 npy，如果是 bin 请自行调整
  image_size: 256
  croped_size: 128                    # 裁剪大小，训练时从 256^3 随机裁剪出 128^3块进行训练
  channels: 1
  num_workers: 16                      # 利用你的 96 核 CPU

model:
  base_channels: 32                    # 基础通道数，越大模型越宽，显存占用越高
  ch_mult: [1, 2, 2, 4]                # 下采样倍率，256 -> 128 -> 64 -> 32 (Latent大小 32x32x32)
  num_res_blocks: 1
  z_channels: 4                        # Latent 的通道数 (最终压缩为 4x32x32x32)
  
loss:
  kl_weight: 0.000001                  # KL 散度的权重，初期要小，避免后验坍塌
  disc_weight: 0.5                     # 对抗损失权重
  disc_start: 1001                     # 多少步之后开启判别器 (Warmup)

train:
  seed: 42
  batch_size: 12                        # A100 80G 上 256^3 数据，建议从 2 开始尝试，甚至可以试 4
  epochs: 200
  lr: 1.0e-4   # 4.5e-6 * batch_size? 通常 1e-4 是个好的起点
  log_interval: 1                     # 多少个 batch 打印一次日志
  save_interval: 1                     # 多少个 epoch 保存一次模型